name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [app-builder, dashboard]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - name: Install
        working-directory: ${{ matrix.app }}
        run: npm ci
      - name: Typecheck
        working-directory: ${{ matrix.app }}
        run: npx tsc --noEmit
      - name: Test
        working-directory: ${{ matrix.app }}
        run: npx vitest run
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
