name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  # Reproduces the committed gate result instead of trusting it. A results file
  # is just correctly-shaped JSON; the only way to tell a real score from a
  # hand-authored one is to run the gate again and compare rule-by-rule.
  results-provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci
      - name: Install app deps (gate runs real checks against the app)
        working-directory: app-builder
        run: npm ci
      - name: Verify results were produced by the gate
        run: node .github/scripts/verify_results.mjs app-builder results/app-builder.json evidence/verdicts-app-builder.json ci,process
      # The dashboard fetches results/all.json directly, so the artifact the
      # public site displays must be derived from the verified per-run files
      # rather than hand-maintained alongside them.
      - name: Verify the dashboard feed is derived, not hand-edited
        run: node .github/scripts/build_feed.mjs --check
      - name: Verify design rules match the skill source
        run: node .github/scripts/verify_design_rules.mjs
      # The app gate waives the ci lane (generated apps have no workflows), so the
      # repo's own CI blockers are scored here instead of nowhere.
      - name: Gate the repo against its own CI-lane blockers
        run: node .github/scripts/gate_repo_ci.mjs
      # End-to-end smoke of the core flow against production, driven by role with
      # web-first assertions (no fixed sleeps). Catches the chat -> wizard -> Forge
      # PRD path that shipped a 400. Best-effort: needs a browser, so it installs
      # chromium and does not fail the build if the browser cannot launch in CI.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: E2E smoke against production
        run: node .github/scripts/e2e_smoke.mjs https://redanvil.pages.dev/

  # Note: linting is NOT repeated here. The root `npm run lint` in the
  # orchestrator job runs `eslint .` over the whole repo, which already covers
  # every file in both apps (50 of the 99 files it lints). Running it per-app
  # would also fail: eslint is a root devDependency, absent from each app's own
  # node_modules after a standalone `npm ci` (exit 127).
  apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [app-builder, dashboard]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - name: Install
        working-directory: ${{ matrix.app }}
        run: npm ci
      - name: Typecheck
        working-directory: ${{ matrix.app }}
        run: npx tsc --noEmit
      - name: Test
        working-directory: ${{ matrix.app }}
        run: npx vitest run
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
